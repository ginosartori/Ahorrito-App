<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ahorrito</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Estilos -->
    <link rel="stylesheet" href="css/styles.css?v=1.0.2">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 50%, rgba(220, 179, 66, 0.04) 0%, transparent 60%);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--bg-sidebar);
            border: 1px solid rgba(220, 179, 66, 0.3);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lux), var(--shadow-gold);
            backdrop-filter: var(--glass-blur);
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .auth-logo .logo-icon {
            color: var(--gold);
            filter: drop-shadow(0 0 6px rgba(220, 179, 66, 0.4));
        }
        .auth-logo .logo-text {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header h2 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-premium);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px 14px;
            font-size: 14px;
            transition: var(--transition-smooth);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(220, 179, 66, 0.18);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .alert-error {
            background-color: rgba(226, 97, 97, 0.12);
            border: 1px solid rgba(226, 97, 97, 0.35);
            color: var(--danger);
        }
        .alert-success {
            background-color: rgba(82, 196, 136, 0.12);
            border: 1px solid rgba(82, 196, 136, 0.35);
            color: var(--green-accent);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
        }
        .auth-footer a:hover {
            color: var(--gold-light);
            text-decoration: underline;
        }
        .password-toggle-btn {
            transition: var(--transition-smooth);
        }
        .password-toggle-btn:hover {
            color: var(--gold) !important;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <i data-lucide="sparkles"></i>
                </div>
                <span class="logo-text">AHORRITO</span>
            </div>
            
            <div class="auth-header">
                <h2>Iniciar Sesión</h2>
                <p>Ingresá tus credenciales para acceder</p>
            </div>

            <!-- Alerts -->
            <div id="alert-error" class="alert alert-error">
                <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>
            <div id="alert-success" class="alert alert-success">
                <i data-lucide="check-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                <span>Sesión cerrada correctamente.</span>
            </div>

            <form id="login-form" action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Ingresá tu usuario">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper" style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" spellcheck="false" autocapitalize="none" style="padding-right: 44px; width: 100%;">
                        <button type="button" class="password-toggle-btn" tabindex="-1" aria-label="Mostrar contraseña" style="position: absolute; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
                            <i data-lucide="eye" class="eye-icon" style="width: 18px; height: 18px;"></i>
                            <i data-lucide="eye-off" class="eye-off-icon" style="width: 18px; height: 18px; display: none;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-gold w-100" style="margin-top: 10px; height: 45px;">
                    <span>Entrar</span>
                    <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 16px;">
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
            </div>

            <div class="auth-footer">
                ¿No tenés una cuenta? <a href="register.html">Registrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Manejar el botón de visibilidad de contraseña
        document.querySelectorAll('.password-toggle-btn').forEach(button => {
            const input = button.parentNode.querySelector('input');
            const eyeIcon = button.querySelector('.eye-icon');
            const eyeOffIcon = button.querySelector('.eye-off-icon');
            
            function showPassword(show) {
                if (show) {
                    input.type = 'text';
                    if (eyeIcon) eyeIcon.style.display = 'none';
                    if (eyeOffIcon) eyeOffIcon.style.display = 'block';
                } else {
                    input.type = 'password';
                    if (eyeIcon) eyeIcon.style.display = 'block';
                    if (eyeOffIcon) eyeOffIcon.style.display = 'none';
                }
            }

            // Ocultar contraseña automáticamente al perder el foco (Medida de Seguridad)
            input.addEventListener('blur', () => {
                setTimeout(() => {
                    showPassword(false);
                }, 150);
            });

            button.addEventListener('click', () => {
                showPassword(input.type === 'password');
            });
        });

        // Mostrar alertas según parámetros URL
        const params = new URLSearchParams(window.location.search);
        if (params.has('error')) {
            document.getElementById('alert-error').style.display = 'flex';
        }
        if (params.has('logout')) {
            document.getElementById('alert-success').style.display = 'flex';
        }

        // Prevenir doble envío
        document.getElementById('login-form').addEventListener('submit', (e) => {
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.querySelector('span').textContent = 'Ingresando...';
            setTimeout(() => {
                submitBtn.disabled = true;
            }, 0);
        });
    </script>
</body>
</html>
