# ===================================================================
# CONFIGURACIÓN PARA PRODUCCIÓN (POSTGRESQL - RAILWAY)
# ===================================================================

# Perfil activo
spring.config.activate.on-profile=prod

# Configuración de base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ahorrito}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Desactivar la consola H2 en producción por seguridad
spring.h2.console.enabled=false

# Optimización de inicialización (ahorro de RAM al iniciar)
spring.main.lazy-initialization=true

# Optimización del Pool de Conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=15000

# Puerto dinámico de Render
server.port=${PORT:8080}

# Seguridad en Producción
app.security.seed-admin=false
app.security.registration-enabled=${REGISTRATION_ENABLED:true}
app.security.max-users=${MAX_USERS:1000}
spring.h2.console.enabled=false



